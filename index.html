<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>961 Food | Snacks & More</title>

  <link rel="stylesheet" href="css/style.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Outfit:wght@300;600;700;800;900&family=Cairo:wght@400;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
</head>

<body>
  <header class="brand-hero">
    <div class="language-toggle" aria-label="Language selector">
      <button id="lang-en" class="lang-btn active" type="button">English</button>
      <button id="lang-ar" class="lang-btn" type="button">عربي</button>
    </div>

    <div class="brand-content">
      <div class="logo">
        <span class="logo-number">961</span>
        <span class="logo-food">Food</span>
      </div>

      <div class="tagline" id="tagline">Snacks & More</div>
    </div>
  </header>

  <nav id="category-nav" aria-label="Menu categories">
    <div class="nav-scroll-wrapper" id="nav-links"></div>
  </nav>

  <main id="menu-container"></main>

  <footer>
    <div class="footer-container">
      <div class="footer-map">
        <iframe
          title="961 Food location"
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3312.4485!2d35.5131!3d33.8938!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzPCsDUzJzM3LjciTiAzNcKwMzAnNDcuMiJF!5e0!3m2!1sen!2slb!4v1620000000000!5m2!1sen!2slb"
          width="100%"
          height="200"
          style="border:0;"
          allowfullscreen=""
          loading="lazy">
        </iframe>
      </div>

      <div class="footer-info">
        <h3 id="footer-title">Visit Us</h3>
        <p id="footer-location">Lebanon</p>

        <div class="social-icons">
          <a
            href="https://www.instagram.com/crepura1?igsh=MTllY2VncHp2Y21lYw=="
            target="_blank"
            rel="noreferrer"
            aria-label="Instagram">
            <i class="fab fa-instagram"></i>
          </a>

          <a
            href="https://www.tiktok.com/@crepura?_r=1&_t=ZS-93X4kCnGCgb"
            target="_blank"
            rel="noreferrer"
            aria-label="TikTok">
            <i class="fab fa-tiktok"></i>
          </a>

          <a
            href="https://wa.me/96171165403"
            target="_blank"
            rel="noreferrer"
            aria-label="WhatsApp">
            <i class="fab fa-whatsapp"></i>
          </a>
        </div>
      </div>
    </div>

    <div class="footer-bottom" id="footer-bottom">
      © 2026 961 Food. Built for speed.
    </div>
  </footer>

  <div id="item-modal" class="modal" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true">
      <button class="close-btn" type="button" aria-label="Close modal">×</button>

      <div class="modal-img-container">
        <img src="" id="modal-img" alt="" />
      </div>

      <div class="modal-text">
        <h2 id="modal-title"></h2>
        <p id="modal-price" class="modal-price"></p>
        <p id="modal-desc"></p>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
